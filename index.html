<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Los Mata Bots - Redes</title>
	<!-- Font Awesome para los íconos -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<style>
		body {
			margin: 0;
			padding: 0;
			min-height: 100vh;
			background: #181818 url('https://www.transparenttextures.com/patterns/diagmonds-light.png');
			color: #fff;
			font-family: 'Orbitron', 'Arial Black', Arial, sans-serif;
			display: flex;
			flex-direction: column;
			align-items: center;
		}
		.container {
			width: 95%;
			max-width: 480px;
			margin: 40px auto;
			background: rgba(20,20,20,0.95);
			border-radius: 18px;
			box-shadow: 0 0 24px #ff6600a0;
			border: 2px solid #ff6600;
			padding: 32px 18px 24px 18px;
			text-align: center;
		}
		.logo {
			width: 120px;
			height: 120px;
			margin: 0 auto 18px auto;
			background: url('https://i.imgur.com/1Q9Z1ZB.png') center/contain no-repeat; /* Cambia por tu logo */
		}
		h1 {
			font-size: 2.2rem;
			margin: 0 0 0.2em 0;
			letter-spacing: 2px;
			font-weight: bold;
			color: #fff;
			text-shadow: 0 2px 12px #ff6600a0;
		}
		.subtitle {
			color: #ff6600;
			font-size: 1.3rem;
			font-weight: bold;
			margin-bottom: 1.5em;
			letter-spacing: 2px;
		}
		.redes-list {
			display: flex;
			flex-direction: column;
			gap: 18px;
			margin-bottom: 18px;
		}
		.red-link {
			display: flex;
			align-items: center;
			justify-content: space-between;
			background: #232323;
			border: 2px solid #ff6600;
			border-radius: 12px;
			padding: 14px 18px;
			text-decoration: none;
			color: #fff;
			font-size: 1.15rem;
			font-weight: bold;
			transition: background 0.2s, box-shadow 0.2s;
			box-shadow: 0 2px 8px #ff660066;
		}
		.red-link:hover {
			background: #ff6600;
			color: #181818;
			box-shadow: 0 0 18px #ff6600cc;
		}
		.red-link .icon {
			font-size: 2rem;
			margin-right: 16px;
			min-width: 36px;
		}
		.red-link .arrow {
			font-size: 1.5rem;
			color: #ff6600;
			margin-left: 16px;
			transition: color 0.2s;
		}
		.red-link:hover .arrow {
			color: #181818;
		}
		.footer {
			margin-top: 18px;
			color: #ff6600;
			font-size: 1rem;
			letter-spacing: 2px;
		}
		@media (max-width: 600px) {
			.container {
				padding: 18px 4px 12px 4px;
			}
			h1 {
				font-size: 1.3rem;
			}
			.subtitle {
				font-size: 1rem;
			}
		}
	</style>
</head>
<body>
	<div class="container">
		<div class="logo"></div>
		<h1>LOS MATA BOTS</h1>
		<div class="subtitle">REDES</div>
		<div class="redes-list">
			<a class="red-link" href="https://discord.gg/XhG9KxzDsn" target="_blank" rel="noopener">
				<span style="display:flex;align-items:center;"><span class="icon"><i class="fab fa-discord"></i></span>DISCORD</span>
				<span class="arrow"><i class="fas fa-chevron-right"></i></span>
			</a>
			<a class="red-link" href="https://www.twitch.tv/losmattabots" target="_blank" rel="noopener">
				<span style="display:flex;align-items:center;"><span class="icon"><i class="fab fa-twitch"></i></span>TWITCH</span>
				<span class="arrow"><i class="fas fa-chevron-right"></i></span>
			</a>
			<a class="red-link" href="https://kick.com/losmattabots" target="_blank" rel="noopener">
				<span style="display:flex;align-items:center;"><span class="icon"><i class="fa-solid fa-k"></i></span>KICK</span>
				<span class="arrow"><i class="fas fa-chevron-right"></i></span>
			</a>
			<a class="red-link" href="https://x.com/LosMattabots" target="_blank" rel="noopener">
				<span style="display:flex;align-items:center;"><span class="icon"><i class="fab fa-x-twitter"></i></span>X (TWITTER)</span>
				<span class="arrow"><i class="fas fa-chevron-right"></i></span>
			</a>
		</div>
		<div class="footer">COMUNIDAD &bull; STREAMS &bull; GAMING</div>
	</div>
</body>
</html>
